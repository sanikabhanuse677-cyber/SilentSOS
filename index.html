<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilentSOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html"><span class="dot"></span>SilentSOS</a>
  <a href="index.html" class="active">Home</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="contacts.html">Contacts</a>
  <a href="history.html">History</a>
</nav>

<main>
  <!-- SOS trigger -->
  <div class="sos-wrap">
    <p class="section-label">Emergency trigger</p>

    <div class="sos-ring">
      <button id="sos-btn" aria-label="Activate SOS">
        <span>ACTIVATE</span>
        <span class="label">SOS</span>
      </button>
    </div>

    <div id="status-bar">Press the button to send an emergency alert</div>

    <button id="test-btn">Send test alert</button>

    <!-- SMS / Share -->
    <div id="action-row" class="action-row" hidden>
      <a id="sms-btn" class="btn btn-primary" href="#">📱 Send SMS</a>
      <button id="share-btn" class="btn btn-secondary">🔗 Share</button>
    </div>
  </div>

  <!-- Live map -->
  <div id="map-section">
    <p class="section-label">Your location</p>
    <iframe id="map-frame" allowfullscreen loading="lazy"
            title="Live location map"></iframe>
  </div>

  <div id="active-alert-card" class="card" style="display:none;margin-top:1rem;">

  <h3>🚨 Emergency Alert Active</h3>

  <p id="alert-status-home"></p>

  <p id="alert-time-home"></p>

  <p>
    Your SOS has been sent successfully.
  </p>

  <div id="emergency-contact-buttons"></div>

</div>

</main>

<div id="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
